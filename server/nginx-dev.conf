server {
    server_name dev.tupcalculator.org;

    root /var/www/dev.tupcalculator.org;
    index index.html;

    # Vite content-hashed assets — safe to cache forever
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Unhashed static files (images, fonts, icons) — 7 days
    location ~* \.(png|svg|ico|woff2|woff|webp|jpg|jpeg|gif|webmanifest)$ {
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # index.html — always revalidate so new hashed refs are picked up
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # API proxy — dev Express on port 3002
    location /api/ {
        proxy_pass http://127.0.0.1:3002/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 15s;
    }

    # SPA fallback — revalidate
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ =404;
    }

    listen [::]:443 ssl;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/dev.tupcalculator.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.tupcalculator.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = dev.tupcalculator.org) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    listen [::]:80;
    server_name dev.tupcalculator.org;
    return 404;
}
