# ── Rate limiting zones ───────────────────────────────────────────────────────
# General: 10 req/s per IP with burst of 20 (covers static + API)
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
# API-specific: 5 req/s per IP (stricter for upstream proxy calls)
limit_req_zone $binary_remote_addr zone=api:10m rate=5r/s;
# Auth endpoints: 1 req/s per IP (brute force protection)
limit_req_zone $binary_remote_addr zone=auth:10m rate=1r/s;
# Connection limit: max 20 concurrent connections per IP
limit_conn_zone $binary_remote_addr zone=connlimit:10m;

# Return 429 instead of default 503 for rate-limited requests
limit_req_status 429;
limit_conn_status 429;

server {
    server_name tupcalculator.org www.tupcalculator.org;

    root /var/www/tupcalculator.org;
    index index.html;

    # ── Global connection + request limits ────────────────────────────────────
    limit_conn connlimit 20;
    limit_req  zone=general burst=20 nodelay;

    # ── Global request body cap (no file uploads needed) ──────────────────────
    client_max_body_size 64k;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://accounts.google.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://*.googleusercontent.com; connect-src 'self'; frame-src https://accounts.google.com; base-uri 'self'; form-action 'self';" always;

    # ── Block common vulnerability scanners / unwanted paths ──────────────────
    location ~* ^/(\.env|\.git|wp-admin|wp-login|phpmyadmin|xmlrpc\.php|\.well-known/(?!acme-challenge)) {
        return 444;
    }

    # Vite content-hashed assets — safe to cache forever
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Unhashed static files (images, fonts, icons) — 7 days
    location ~* \.(png|svg|ico|woff2|woff|webp|jpg|jpeg|gif|webmanifest)$ {
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # index.html — always revalidate so new hashed refs are picked up
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Auth API — strictest rate limiting (brute force protection)
    location /api/auth/ {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://127.0.0.1:3001/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
        proxy_connect_timeout 5s;
        proxy_send_timeout 5s;
    }

    # API proxy — moderate rate limiting
    location /api/ {
        limit_req zone=api burst=15 nodelay;
        proxy_pass http://127.0.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 15s;
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
    }

    # SPA fallback — revalidate
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ =404;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/tupcalculator.org/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/tupcalculator.org/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.tupcalculator.org) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = tupcalculator.org) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name tupcalculator.org www.tupcalculator.org;
    return 404; # managed by Certbot
}
